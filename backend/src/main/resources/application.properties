# Little Bloom Backend Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.address=localhost

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/littlebloom
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.type.preferred_instantiation_constructor=constructor
spring.jpa.properties.hibernate.types.print.banner=false

# Logging
logging.level.root=INFO
logging.level.com.littlebloom=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG

# JWT Configuration
jwt.secret=DhakshathaSuperSecureJWTSecretKeyForLittleBloomApplicationMustBeAtLeast64CharactersLong123456789
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Security Configuration
spring.security.cors.enabled=true

# Application Name
spring.application.name=Little Bloom Backend

# Data Science Service
ds.service.url=http://localhost:5000
