# Little Bloom Backend Configuration - Production

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database Configuration (Use environment variables for production)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/littlebloom}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging
logging.level.root=INFO
logging.level.com.littlebloom=INFO

# JWT Configuration
jwt.secret=${JWT_SECRET:DhakshathaSuperSecureJWTSecretKeyForLittleBloomApplicationMustBeAtLeast64CharactersLong123456789}
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/

# CORS Configuration (Update with your deployed frontend URL)
cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Application Name
spring.application.name=Little Bloom Backend

# Data Science Service
ds.service.url=${PYTHON_SERVICE_URL:http://localhost:5000}