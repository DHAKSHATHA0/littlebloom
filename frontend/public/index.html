<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Little Bloom - Premium baby products and essentials for your little one. Shop high-quality, safe, and sustainable products for newborns and infants." />
    <meta name="theme-color" content="#FFF5F7" />
    <meta name="keywords" content="baby products, baby essentials, newborn items, infant care, baby store" />
    <meta name="author" content="Little Bloom" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg" />
    
    <!-- Google Fonts - Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>Little Bloom - Baby Products Store</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #FFF5F7 0%, #FFE8F0 100%);
            color: #333;
            line-height: 1.6;
        }
        
        #root {
            width: 100%;
            min-height: 100vh;
        }
        
        body {
            background-color: #FFF5F7;
        }
    </style>
    
    <!-- Loading fallback -->
    <noscript>
        <div style="
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: #d4559d;
        ">
            <p>Little Bloom requires JavaScript to be enabled. Please enable JavaScript in your browser settings.</p>
        </div>
    </noscript>
</head>
<body>
    <!-- React Root -->
    <div id="root"></div>
</body>
</html>
